<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; color: #172b4d; padding: 0; }
    .parent-label { font-size: 11px; text-transform: uppercase; color: #5e6c84; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.5px; }
    .child-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; margin: 2px 0; background: #f4f5f7; border-radius: 4px; cursor: default; }
    .child-row:hover { background: #ebecf0; }
    .child-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; color: #0079bf; }
    .child-name:hover { text-decoration: underline; }
    .child-prefix { color: #5e6c84; margin-right: 6px; }
    .unlink-x { color: #b3bac5; cursor: pointer; padding: 0 4px; font-size: 16px; line-height: 1; }
    .unlink-x:hover { color: #eb5a46; }
    .parent-row { padding: 6px 8px; background: #e4f0f6; border-radius: 4px; border-left: 3px solid #0079bf; cursor: pointer; }
    .parent-row:hover { background: #d6e8f3; }
    .section-group { margin-bottom: 8px; }
    .empty { color: #97a0af; font-size: 13px; padding: 4px 0; }
  </style>
</head>
<body>
  <div id="content"></div>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="../js/nesting.js"></script>
  <script>
    var t = TrelloPowerUp.iframe();

    t.card('id').then(function (card) {
      Promise.all([
        getPluginData(t, card.id),
        t.cards('id', 'name')
      ]).then(function (results) {
        var data = results[0];
        var allCards = results[1];

        return pruneStaleChildren(t, card.id, data).then(function (data) {
          var content = document.getElementById('content');

          if (!data.isParent && !data.isChild) {
            content.innerHTML = '<div class="empty">No links yet. Use the buttons on the right to get started.</div>';
            t.sizeTo('#content');
            return;
          }

          if (data.isChild && data.parentId) {
            var parent = allCards.find(function (c) { return c.id === data.parentId; });
            var group = document.createElement('div');
            group.className = 'section-group';

            var label = document.createElement('div');
            label.className = 'parent-label';
            label.textContent = 'Parent';
            group.appendChild(label);

            var row = document.createElement('div');
            row.className = 'parent-row';
            row.textContent = parent ? parent.name : '(deleted card)';
            if (parent) {
              row.addEventListener('click', function () { t.showCard(parent.id); });
            }
            group.appendChild(row);
            content.appendChild(group);
          }

          if (data.isParent && data.childIds && data.childIds.length > 0) {
            var group = document.createElement('div');
            group.className = 'section-group';

            var label = document.createElement('div');
            label.className = 'parent-label';
            label.textContent = 'Children (' + data.childIds.length + ')';
            group.appendChild(label);

            data.childIds.forEach(function (childId) {
              var child = allCards.find(function (c) { return c.id === childId; });
              if (!child) return;

              var row = document.createElement('div');
              row.className = 'child-row';

              var prefix = document.createElement('span');
              prefix.className = 'child-prefix';
              prefix.textContent = '↳';
              row.appendChild(prefix);

              var name = document.createElement('span');
              name.className = 'child-name';
              name.textContent = child.name;
              name.addEventListener('click', function () { t.showCard(childId); });
              row.appendChild(name);

              var unlink = document.createElement('span');
              unlink.className = 'unlink-x';
              unlink.title = 'Unlink';
              unlink.textContent = '✕';
              unlink.addEventListener('click', function () {
                unlinkChild(t, card.id, childId).then(function () {
                  row.remove();
                  var remaining = group.querySelectorAll('.child-row');
                  if (remaining.length === 0) {
                    label.textContent = 'Children (0)';
                    group.innerHTML = '';
                    var empty = document.createElement('div');
                    empty.className = 'empty';
                    empty.textContent = 'No children linked.';
                    group.appendChild(empty);
                  } else {
                    label.textContent = 'Children (' + remaining.length + ')';
                  }
                  t.sizeTo('#content');
                }).catch(function () {
                  t.alert({ message: 'Failed to unlink. Please try again.', duration: 3 });
                });
              });
              row.appendChild(unlink);

              group.appendChild(row);
            });

            content.appendChild(group);
          }

          t.sizeTo('#content');
        });
      });
    }).catch(function () {
      document.getElementById('content').innerHTML = '<div class="empty">Failed to load nesting data.</div>';
    });
  </script>
</body>
</html>
