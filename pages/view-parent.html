<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/popup.css">
</head>
<body>
  <div id="app">
    <div id="parent-info"></div>
  </div>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="../js/nesting.js"></script>
  <script>
    var t = TrelloPowerUp.iframe();

    t.card('id').then(function (card) {
      getPluginData(t, card.id).then(function (data) {
        if (!data.parentId) {
          document.getElementById('parent-info').innerHTML = '<div class="empty">No parent linked.</div>';
          return;
        }

        t.cards('id', 'name').then(function (allCards) {
          var parent = allCards.find(function (c) { return c.id === data.parentId; });
          var container = document.getElementById('parent-info');

          if (!parent) {
            container.innerHTML = '<div class="empty">Parent card not found (may have been deleted).</div>';
            return;
          }

          var wrapper = document.createElement('div');
          wrapper.className = 'parent-card';

          var label = document.createElement('div');
          label.className = 'parent-label';
          label.textContent = 'Parent Card';
          wrapper.appendChild(label);

          var row = document.createElement('div');
          row.className = 'card-row';
          row.textContent = parent.name;
          wrapper.appendChild(row);

          var btn = document.createElement('button');
          btn.className = 'action-btn';
          btn.textContent = 'Unlink from Parent';
          btn.addEventListener('click', function () {
            unlinkChild(t, data.parentId, card.id).then(function () {
              t.alert({ message: 'Unlinked from parent.', duration: 2 });
              t.closePopup();
            }).catch(function () {
              t.alert({ message: 'Failed to unlink. Please try again.', duration: 3 });
            });
          });
          wrapper.appendChild(btn);

          container.appendChild(wrapper);
        });
      });
    }).catch(function () {
      document.getElementById('parent-info').innerHTML = '<div class="empty">Failed to load parent info.</div>';
    });
  </script>
</body>
</html>
