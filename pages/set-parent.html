<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/popup.css">
</head>
<body>
  <div id="app">
    <input type="text" id="search" placeholder="Search for parent card..." />
    <div id="card-list"></div>
  </div>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="../js/nesting.js"></script>
  <script>
    var t = TrelloPowerUp.iframe();

    t.card('id').then(function (card) {
      var childId = card.id;

      t.cards('id', 'name').then(function (cards) {
        var list = document.getElementById('card-list');
        var search = document.getElementById('search');

        function render(filter) {
          list.innerHTML = '';
          var filtered = cards.filter(function (c) {
            if (c.id === childId) return false;
            if (!filter) return true;
            return c.name.toLowerCase().indexOf(filter.toLowerCase()) > -1;
          });

          if (filtered.length === 0) {
            list.innerHTML = '<div class="empty">No cards found.</div>';
            return;
          }

          filtered.forEach(function (parentCard) {
            var div = document.createElement('div');
            div.className = 'card-row';
            div.textContent = parentCard.name;
            div.addEventListener('click', function () {
              linkChild(t, parentCard.id, childId).then(function (result) {
                if (!result.ok) {
                  t.alert({ message: result.reason, duration: 4 });
                  return;
                }
                t.alert({ message: 'Linked to "' + parentCard.name + '" as child.', duration: 3 });
                t.closePopup();
              }).catch(function () {
                t.alert({ message: 'Failed to set parent. Please try again.', duration: 3 });
              });
            });
            list.appendChild(div);
          });
        }

        search.addEventListener('input', function () {
          render(this.value);
        });

        render('');
      });
    }).catch(function () {
      document.getElementById('card-list').innerHTML = '<div class="empty">Failed to load cards.</div>';
    });
  </script>
</body>
</html>
